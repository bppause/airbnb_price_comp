
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Morroskai Pricing App</title>

  <!-- Config (from server) -->
  <script src="/app-config.js"></script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { font-family: Arial; padding:20px; }
    input, select { margin:5px; padding:5px; }
    button { margin:5px; padding:6px 10px; }
    .card { border:1px solid #ddd; padding:10px; margin-top:10px; }
  </style>
</head>

<body>

<h2 id="title">Morroskai Pricing App</h2>

<!-- AUTH -->
<div class="card">
  <button onclick="login()">Login with Google</button>
  <button onclick="logout()">Logout</button>
  <div id="user-info"></div>
</div>

<!-- PROPERTY -->
<div class="card">
  <h3>Property</h3>

  <input id="building" placeholder="Building" value="Morros Kai">
  <input id="unit" placeholder="Unit" value="317">
  <input id="city" placeholder="City" value="Cartagena">
  <input id="country" placeholder="Country" value="Colombia">

  <br>

  <input id="baseRate" type="number" value="400000">
  <input id="fx" type="number" value="3500">

  <br>

  <input id="costs" type="number" value="9800000">
  <input id="income" type="number" value="1000000">

</div>

<!-- SAVE / LOAD -->
<div class="card">
  <h3>Saved Properties</h3>

  <select id="propertySelect"></select><br>

  <button onclick="saveProperty()">Save now</button>
  <button onclick="saveAsNew()">Save as new</button>
  <button onclick="loadProperty()">Load Selected</button>
</div>

<!-- RESULT -->
<div class="card">
  <h3>Net Income</h3>
  <div id="netCop"></div>
  <div id="netUsd"></div>
</div>

<script>

let supabaseClient = null;
let currentUser = null;

// INIT
window.addEventListener("load", async () => {
  if (!window.SUPABASE_URL) {
    alert("Supabase not configured");
    return;
  }

  supabaseClient = supabase.createClient(
    window.SUPABASE_URL,
    window.SUPABASE_ANON_KEY
  );

  const { data } = await supabaseClient.auth.getUser();
  currentUser = data.user;

  updateUserUI();
  loadSavedProperties();
  updateHeader();
  calculate();
});

// AUTH
async function login() {
  await supabaseClient.auth.signInWithOAuth({
    provider: "google",
    options: {
      redirectTo: window.location.origin
    }
  });
}

async function logout() {
  await supabaseClient.auth.signOut();
  location.reload();
}

function updateUserUI() {
  document.getElementById("user-info").innerText =
    currentUser ? "Logged in: " + currentUser.email : "Not logged in";
}

// COLLECT ALL DATA
function collectState() {
  return {
    building: val("building"),
    unit: val("unit"),
    city: val("city"),
    country: val("country"),

    baseRate: num("baseRate"),
    fx: num("fx"),

    monthlyCosts: num("costs"),
    monthlyIncome: num("income")
  };
}

// APPLY STATE
function applyState(s) {
  set("building", s.building);
  set("unit", s.unit);
  set("city", s.city);
  set("country", s.country);

  set("baseRate", s.baseRate);
  set("fx", s.fx);

  set("costs", s.monthlyCosts);
  set("income", s.monthlyIncome);

  updateHeader();
  calculate();
}

// SAVE
async function saveProperty() {
  const state = collectState();
  const name = "Property";

  await supabaseClient
    .from("user_properties")
    .upsert({
      user_id: currentUser.id,
      slug: "default",
      name,
      settings: state
    });

  loadSavedProperties();
}

// SAVE NEW
async function saveAsNew() {
  const name = prompt("Property name?");
  if (!name) return;

  const state = collectState();

  await supabaseClient
    .from("user_properties")
    .insert({
      user_id: currentUser.id,
      slug: Date.now().toString(),
      name,
      settings: state
    });

  loadSavedProperties();
}

// LOAD LIST
async function loadSavedProperties() {
  if (!currentUser) return;

  const { data } = await supabaseClient
    .from("user_properties")
    .select("*")
    .eq("user_id", currentUser.id);

  const select = document.getElementById("propertySelect");
  select.innerHTML = "";

  data?.forEach(p => {
    const opt = document.createElement("option");
    opt.value = p.id;
    opt.textContent = p.name;
    select.appendChild(opt);
  });
}

// LOAD SELECTED
async function loadProperty() {
  const id = document.getElementById("propertySelect").value;

  const { data } = await supabaseClient
    .from("user_properties")
    .select("*")
    .eq("id", id)
    .single();

  if (data) applyState(data.settings);
}

// CALCULATE
function calculate() {
  const base = num("baseRate");
  const fx = num("fx");

  const monthlyCosts = num("costs");
  const monthlyIncome = num("income");

  const annualCosts = monthlyCosts * 12;
  const annualIncome = monthlyIncome * 12;

  const gross = base * 365 * 0.6; // simple assumption
  const net = gross + annualIncome - annualCosts;

  document.getElementById("netCop").innerText =
    "Net COP: " + net.toLocaleString();

  document.getElementById("netUsd").innerText =
    "Net USD: " + (net / fx).toFixed(0);
}

// HEADER
function updateHeader() {
  const title = `${val("building")} #${val("unit")} - ${val("city")}`;
  document.getElementById("title").innerText = title;
  document.title = title;
}

// HELPERS
function val(id){ return document.getElementById(id).value; }
function num(id){ return Number(val(id)) || 0; }
function set(id,v){ document.getElementById(id).value = v; }

document.querySelectorAll("input").forEach(i=>{
  i.addEventListener("input", ()=>{
    updateHeader();
    calculate();
  });
});

</script>

</body>
</html>
