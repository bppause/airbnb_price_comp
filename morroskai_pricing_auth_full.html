<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MorrosKai Pricing Engine</title>

<script src="/app-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#f5f5f5; padding:20px; }
.card { background:#fff; padding:14px; margin-bottom:12px; border-radius:8px; }
h3 { margin-top:0; }
input { padding:6px; margin:4px 0; width:120px; }
.small { font-size:11px; color:#777; }
.override { color:#d97706; font-size:11px; }
.auto { color:#888; font-size:11px; }
.row { display:flex; gap:20px; flex-wrap:wrap; }
</style>
</head>

<body>

<h2 id="header">MorrosKai Pricing</h2>

<div class="card">
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>
<div id="user"></div>
</div>

<div class="card">
<h3>Years</h3>
<div id="yearsUI"></div>
<button onclick="addYear()">+ Add Year</button>
</div>

<div class="card">
<h3>Dashboard</h3>
<div id="summary"></div>
</div>

<div class="card">
<h3>Performance</h3>
<canvas id="chart"></canvas>
</div>

<script>
let supabaseClient;
let user = null;

let CFG = {
  baseRate: 400000,
  fx: 3500,
  useSmartPricing: true
};

let YEARS = [];

function fc(x){ return "COP " + Math.round(x).toLocaleString(); }
function fu(x){ return "$" + Math.round(x).toLocaleString(); }

window.onload = async () => {
  supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const { data } = await supabaseClient.auth.getUser();
  user = data.user;
  renderUser();

  if(user) loadData();
  else initDefault();
};

function renderUser(){
  document.getElementById("user").innerText =
    user ? "Signed in: " + user.email : "Not signed in";
}

async function login(){
  await supabaseClient.auth.signInWithOAuth({ provider: "google" });
}

async function logout(){
  await supabaseClient.auth.signOut();
  location.reload();
}

function initDefault(){
  YEARS = [{
    year: 2026,
    inflation: 5,
    baseRateOverride: null,
    monthlyOperatingExpensesOverride: null,
    monthlyOtherIncome: 1000000,
    regularOccupancy: 60,
    peakOccupancy: 80
  }];
  renderAll();
}

async function loadData(){
  const { data } = await supabaseClient
    .from("user_properties")
    .select("*")
    .eq("user_id", user.id)
    .limit(1);

  if(data && data.length){
    YEARS = data[0].settings.YEARS;
  } else {
    initDefault();
    return;
  }

  renderAll();
}

function getDerived(i){
  let y = YEARS[i];

  if(i === 0){
    return {
      baseRate: y.baseRateOverride ?? CFG.baseRate,
      op: y.monthlyOperatingExpensesOverride ?? 9800000
    };
  }

  let prev = getDerived(i-1);
  let factor = 1 + (y.inflation / 100);

  return {
    baseRate: y.baseRateOverride ?? Math.round(prev.baseRate * factor),
    op: y.monthlyOperatingExpensesOverride ?? Math.round(prev.op * factor)
  };
}

function getOcc(y, type){
  return ((type === "peak" ? y.peakOccupancy : y.regularOccupancy) ?? (type==="peak"?80:60)) / 100;
}

function getCompAvgUSD(){
  return 300; // replace with real comps
}

function getRecommended(i){
  let comp = getCompAvgUSD() * CFG.fx;
  let occ = getOcc(YEARS[i], "regular");

  let adj = occ < 0.6 ? 0.9 : occ > 0.75 ? 1.1 : 1;

  return Math.round(comp * adj);
}

function calc(i){
  let y = YEARS[i];
  let d = getDerived(i);

  let revenue =
    (44 * 7 * d.baseRate * getOcc(y,"regular")) +
    (8 * 7 * d.baseRate * getOcc(y,"peak"));

  let op = (y.monthlyOperatingExpensesOverride ?? d.op) * 12;
  let other = (y.monthlyOtherIncome ?? 1000000) * 12;

  let net = revenue + other - op;

  return { revenue, op, other, net };
}

function renderYears(){
  let html = "";

  YEARS.forEach((y,i)=>{
    let d = getDerived(i);

    html += `
    <div class="card">
      <b>${y.year}</b><br>

      Base Rate:
      <input value="${d.baseRate}" onchange="setOverride(${i},'baseRateOverride',this.value)">
      <span class="${y.baseRateOverride ? 'override' : 'auto'}">
        ${y.baseRateOverride ? 'Manual' : 'Auto'}
      </span><br>

      <div class="small">Recommended: ${fc(getRecommended(i))}</div>

      Op Exp:
      <input value="${d.op}" onchange="setOverride(${i},'monthlyOperatingExpensesOverride',this.value)"><br>

      Other Income:
      <input value="${y.monthlyOtherIncome}" onchange="setYear(${i},'monthlyOtherIncome',this.value)"><br>

      Regular Occ:
      <input value="${y.regularOccupancy}" onchange="setYear(${i},'regularOccupancy',this.value)"><br>

      Peak Occ:
      <input value="${y.peakOccupancy}" onchange="setYear(${i},'peakOccupancy',this.value)">
    </div>`;
  });

  document.getElementById("yearsUI").innerHTML = html;
}

function renderDashboard(){
  let rev=0, op=0, other=0, net=0;

  YEARS.forEach((_,i)=>{
    let f = calc(i);
    rev += f.revenue;
    op += f.op;
    other += f.other;
    net += f.net;
  });

  document.getElementById("summary").innerHTML = `
    Revenue: ${fc(rev)} | ${fu(rev/CFG.fx)}<br>
    Operating: ${fc(op)} | ${fu(op/CFG.fx)}<br>
    Other Income: ${fc(other)} | ${fu(other/CFG.fx)}<br>
    Net Income: ${fc(net)} | ${fu(net/CFG.fx)}
  `;

  renderChart();
}

let chart;

function renderChart(){
  let labels = YEARS.map(y=>y.year);
  let rev = YEARS.map((_,i)=>calc(i).revenue);
  let net = YEARS.map((_,i)=>calc(i).net);

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      labels,
      datasets: [
        { label: "Revenue", data: rev },
        { label: "Net Income", data: net }
      ]
    }
  });
}

function setOverride(i,f,v){
  YEARS[i][f] = Number(v);
  save(); renderAll();
}

function setYear(i,f,v){
  YEARS[i][f] = Number(v);
  save(); renderAll();
}

function addYear(){
  let last = YEARS[YEARS.length - 1];

  YEARS.push({
    year: last.year + 1,
    inflation: last.inflation,
    baseRateOverride: null,
    monthlyOperatingExpensesOverride: null,
    monthlyOtherIncome: last.monthlyOtherIncome ?? 1000000,
    regularOccupancy: last.regularOccupancy ?? 60,
    peakOccupancy: last.peakOccupancy ?? 80
  });

  renderAll();
}

function renderAll(){
  renderYears();
  renderDashboard();
}

async function save(){
  if(!user) return;

  await supabaseClient.from("user_properties").upsert({
    user_id: user.id,
    slug: "default",
    name: "Property",
    settings: { YEARS }
  });
}
</script>

</body>
</html>
